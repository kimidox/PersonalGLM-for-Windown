<!DOCTYPE html>
<html>
  <head>

  </head>
  <body>
    <p>你好aaaaa啊啊cccc啊啊</p>
    <button id="myButton">点击我触发方法</button>
  </body>

  <script>
     // 定义要触发的方法
      function handleButtonClick() {
        // 方法执行的逻辑：这里示例为弹出提示框，你可以替换成任意逻辑
        
        // 也可以添加其他逻辑，比如修改页面内容
        document.querySelector('p').textContent = '按钮点击后，文字被修改啦！';
      }

      // 1. 获取按钮元素
      const myButton = document.getElementById('myButton');
      // 2. 给按钮绑定点击事件，触发上面定义的方法
      myButton.addEventListener('click', handleButtonClick);

  </script>
</html>
